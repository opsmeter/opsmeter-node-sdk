name: Release to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node + npm registry
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Validate tag and choose dist-tag
        id: version
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          REF_NAME="${GITHUB_REF_NAME}"

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            TAG_VERSION="${REF_NAME#v}"
            if [[ "${TAG_VERSION}" != "${PACKAGE_VERSION}" ]]; then
              echo "Tag version (${TAG_VERSION}) does not match package.json version (${PACKAGE_VERSION})."
              exit 1
            fi
          fi

          if [[ "${PACKAGE_VERSION}" == *"-"* ]]; then
            DIST_TAG="beta"
          else
            DIST_TAG="latest"
          fi

          echo "package_version=${PACKAGE_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "dist_tag=${DIST_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --access public --tag "${{ steps.version.outputs.dist_tag }}"

      - name: Release summary
        run: |
          echo "Published @opsmeter/node@${{ steps.version.outputs.package_version }} with npm tag '${{ steps.version.outputs.dist_tag }}'."
